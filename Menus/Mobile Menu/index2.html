<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mobile Menu</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container">
        <nav class="nav">
            <ul class="list list__differ justify-none"> 
                <li class="list__items list__items--modifier">
                    <span class="logos">Logo</span>
                </li>
                
                <li class="same-items list__items block">News</li>
                <li class="same-items list__items block">Contact</li>
                <li class="same-items list__items block">About</li>
            <button class="menu-btn menu-btn--differ"><i class="bi bi-list"></i></button>
            </ul>
        </nav>

        <div class="content">
            <h1>Vertical Mobile Navbar</h1>
            <p>This example demonstrates how a navigation menu on a mobile/smart phone could look like.</p>
            <p>Click on the hamburger menu (three bars) in the top right corner, to toggle the menu.</p>
        </div>
    </div>

    <script>
        const menuBtn = document.querySelector(".menu-btn");

        menuBtn.onclick = function() {
            // console.log('salom')
            const listItems = document.querySelectorAll(".same-items");
                listItems.forEach(
                    items => {
                        items.classList.toggle("hidden")
                    }
            )
        }
    </script>
</body>
</html>
