<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click dropdown</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <header class="bg-[#333] text-white">
        <nav>
            <ul class="flex">
                <li class="p-3 cursor-pointer hover:bg-red-600">Home</li>
                <li class="p-3 cursor-pointer hover:bg-red-600">News</li>
                <button id="dropdownes" class="p-3 cursor-pointer hover:bg-red-600 flex gap-2">
                    Dropdown
                    <i class="bi bi-caret-down-fill mt-[2px]"></i>
                        <ul id="list-items" class="hidden flex-col bg-[#f1f1f1] w-40 shadow-lg shadow-[rgba(0,0,0,0.2)] absolute top-[50px] left-32">
                            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">Link1</li>
                            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">Link2</li>
                            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">Link3</li>
                        </ul>
                </button>
            </ul>
        </nav>
    </header>

    <script>
        const list = document.getElementById("list-items");
        const dropdown = document.getElementById('dropdownes'); 

        dropdown.onclick =  () => {
            list.classList.toggle("hidden");
            dropdown.classList.toggle("bg-red-600")
        }

        dropdown.onblur = function() {
            list.classList.add("hidden");
            dropdown.classList.remove("bg-red-600")
        }
    </script>
</body>
</html>
