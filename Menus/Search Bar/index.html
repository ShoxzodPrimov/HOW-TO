<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Bar</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<body>
    <nav class="flex bg-[#e9e9e9] items-center justify-between pr-[10px] max-sm:flex-col max-sm:pr-0">
        <ul class="flex max-sm:flex-col w-[100%]">
            <li class="bg-[#2196F3] text-white p-[10px] cursor-pointer">Home</li>
            <li class="p-[10px] cursor-pointer hover:bg-[#ccc]">About</li>
            <li class="p-[10px] cursor-pointer hover:bg-[#ccc]">Contact</li>
        </ul>

        <div class="flex max-sm:flex-col max-sm:w-[100%]">
            <input type="text" placeholder="Search.." class="bg-white outline-none px-[10px] py-[3px] max-sm:py-[7px]">
            <button class="bg-[#d6d5d5] cursor-pointer px-2 py-[2.5px] translate-x-[-5px] hover:bg-[#c3c3c3] max-sm:py-3 flex items-center max-sm:px-4"><i class="fa fa-search"></i></button>
        </div>
    </nav>

    <section class="p-[10px]">
        <h1 class="text-[1.5rem] font-bold">Responsive Search Bar</h1>
        <p class="my-4">Navigation bar with a search box and a submit button inside of it.</p>
        <p>Resize the browser window to see the responsive effect.</p>
    </section>
</body>
</html>
