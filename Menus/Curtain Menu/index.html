<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtain Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <section class="flex relative">
        <nav id="width" class="w-0 flex flex-col absolute z-[1] bg-black-400 h-[100vh] text-[#818181] overflow-hidden duration-150 ease-in">
            <div class="ml-auto p-5">
                <i id="close-btn" class=" bi bi-x-lg text-2xl cursor-pointer hover:text-white"></i>
            </div>

            <ul class="flex flex-col m-auto gap-4"></ul>
        </nav>
        
        <div class="flex flex-col gap-2 p-2">
            <h1 class="font-black text-2xl">Fullscreen Overlay Nav Example</h1>
            <p>Click on the element below to open the fullscreen overlay navigation menu.</p>
            <p>In this example, the navigation menu will slide in, from left to right:</p>
            <div class="flex items-center">
                <i id="menuBtn" class="bi bi-list cursor-pointer text-2xl"></i>
                <span class="text-lg">open</span>
            </div>
        </div>
    </section>

    <script type="module" src="./index.js"></script>
</body>
</html>
