<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavBar with Iocns</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

    <ul class="flex items-center bg-[#555] text-white max-sm:flex-col">
      <li class="text-[1rem] flex items-center gap-2 cursor-pointer px-[15px] py-[10px] bg-[#04AA6D] max-sm:w-[100%]"><i class="text-white bi bi-house-door text-[15px]"></i>Home</li>
      <li class="text-[1rem] flex items-center gap-2 cursor-pointer px-[15px] py-[10px]  hover:bg-[#000] max-sm:w-[100%]"><i class="text-[13px] text-white bi bi-search"></i>Search</li>
      <li class="text-[1rem] flex items-center gap-2 cursor-pointer px-[15px] py-[10px] hover:bg-[#000] max-sm:w-[100%]"><i class="text-[15px] text-white bi bi-envelope"></i>Contact</li>
      <li class="text-[1rem] flex items-center gap-2 cursor-pointer px-[15px] py-[10px] hover:bg-[#000] max-sm:w-[100%]"><i class="text-[16px] text-white bi bi-person-fill"></i>Login</li>
    </ul>
</body>
</html>
