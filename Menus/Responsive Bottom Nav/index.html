<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REsponsive Bottom Navigation</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

<section class="flex flex-col justify-between h-screen">
    <div class="px-5 py-10">        
        <h1 class="text-[1.4rem] font-bold">Bottom Navigation Bar</h1>
        <p class="mt-3">Some text some text some text.</p>
    </div>

    <nav class="bg-[#333]">
        <ul class="flex text-white max-sm:justify-between">
            <li class="p-3 text-[1rem] cursor-pointer bg-[#04AA6D]">Home</li>
            <li class="toggles p-3 text-[1rem] cursor-pointer hover:bg-[#f1f1f1] hover:text-black max-sm:hidden">News</li>
            <li class="toggles p-3 text-[1rem] cursor-pointer hover:bg-[#f1f1f1] hover:text-black max-sm:hidden">Contact</li>
        <div class="flex max-sm:justify-between max-sm:hover:bg-[#f1f1f1] max-sm:hover:text-black">
            <li class="toggles p-3 text-[1rem] cursor-pointer hover:bg-[#f1f1f1] hover:text-black max-sm:hidden">About</li>
            <button id="menu-btn" class="hidden p-3 text-[1rem] cursor-pointer hover:bg-[#f1f1f1] hover:text-black max-sm:block"><i class="bi bi-list"></i></button>
        </div>
        </ul>
    </nav>
</section>

<script>
    const menuBtn = document.getElementById("menu-btn");
    const listItems = document.querySelectorAll(".toggles");
    const list = document.querySelector("ul");

    menuBtn.onclick = function() {
        list.classList.toggle('max-sm:flex-col');
        listItems.forEach(
            el => {
                el.classList.toggle("max-sm:hidden");
            }
        )
    }
</script>
</body>
</html>
