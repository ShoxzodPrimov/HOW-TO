<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Sidenav Button</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="flex pt-5 relative">
        <ul class="flex flex-col text-white gap-2 w-30 z-1">
            <li class="bg-[#04AA6D] cursor-pointer p-2 rounded-r-md translate-x-[-70px] duration-200 ease-in hover:translate-x-0">About</li>
            <li class="bg-[#2196F3] cursor-pointer p-2 rounded-r-md translate-x-[-70px] duration-200 ease-in hover:translate-x-0">Blog</li>
            <li class="bg-[#f44336] cursor-pointer p-2 rounded-r-md translate-x-[-70px] duration-200 ease-in hover:translate-x-0">Projects</li>
            <li class="bg-[#555] cursor-pointer p-2 rounded-r-sm translate-x-[-70px] duration-200 ease-in hover:translate-x-0">Contact</li>
        </ul>
        <div class="translate-x-[-50px]">
            <h1 class="font-medium text-[1.4rem]">Hoverable Sidenav Buttons</h1>
            <p class="mt-2">Hover over the buttons in the left side navigation to open them.</p>
        </div>
    </div>
</body>
</html>
