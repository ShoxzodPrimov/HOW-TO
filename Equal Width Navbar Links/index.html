<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equal Width Navbar Links</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <nav class="text-white">
        <ul class="flex max-[500px]:flex-col">
            <li class="cursor-pointer h-[5vh] flex justify-center items-center w-[25vw] bg-[#04AA6D] max-[500px]:w-[100%]">Home</li>
            <li class="bg-[#555] h-[5vh] flex justify-center items-center w-[25vw] cursor-pointer hover:bg-black max-[500px]:w-[100%]">Search</li>
            <li class="bg-[#555] h-[5vh] flex justify-center items-center w-[25vw] cursor-pointer hover:bg-black max-[500px]:w-[100%]">Contact</li>
            <li class="bg-[#555] h-[5vh] flex justify-center items-center w-[25vw] cursor-pointer hover:bg-black max-[500px]:w-[100%]">Login</li>
        </ul>
    </nav>
</body>
</html>
