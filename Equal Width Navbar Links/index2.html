<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equal Width Navbar Links</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <nav class="text-white">
        <ul class="flex max-[500px]:flex-col">
            <li class="cursor-pointer h-[5vh] flex justify-center items-center gap-3 w-[25vw] bg-[#04AA6D] max-[500px]:w-[100%] max-[500px]:justify-start max-[500px]:pl-3">Home</li>
            <li class="bg-[#555] h-[5vh] flex justify-center gap-3 items-center w-[25vw] cursor-pointer hover:bg-black max-[500px]:w-[100%] max-[500px]:justify-start max-[500px]:pl-3">Search</li>
            <li class="bg-[#555] h-[5vh] flex justify-center gap-3 items-center w-[25vw] cursor-pointer hover:bg-black max-[500px]:w-[100%] max-[500px]:justify-start max-[500px]:pl-3">Contact</li>
            <li class="bg-[#555] h-[5vh] flex justify-center gap-3 items-center w-[25vw] cursor-pointer hover:bg-black max-[500px]:w-[100%] max-[500px]:justify-start max-[500px]:pl-3">Login</li>
        </ul>
    </nav>
</body>
</html>
