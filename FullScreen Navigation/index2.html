<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navigation 2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

<section class="flex relative">
    <nav id="sideNav" class="bg-[rgba(0,0,0,0.9)] absolute z-1 h-0 w-[100vw] overflow-hidden duration-500 ease-out">
        <div onclick="closeSideNav()" class="flex justify-end pr-4 pt-5"><i class="bi bi-x-lg cursor-pointer text-[#818181] text-[2rem] hover:text-[#f1f1f1]"></i></div>
        <ul class="flex gap-3 flex-col text-[#818181] items-center mt-15">
            <li class="cursor-pointer text-[2.3rem] hover:text-[#f1f1f1]">About</li>
            <li class="cursor-pointer text-[2.3rem] hover:text-[#f1f1f1]">Service</li>
            <li class="cursor-pointer text-[2.3rem] hover:text-[#f1f1f1]">Clinets</li>
            <li class="cursor-pointer text-[2.3rem] hover:text-[#f1f1f1]">Contact</li>
        </ul>
    </nav>
<div class="p-5">
    <h1 class="font-bold text-[1.5rem]">Fullscreen Overlay Nav Example</h1>
    <p class="mt-5 mb-2">Click on the element below to open the fullscreen overlay navigation menu.</p>
    <p class="mb-5">In this example, the navigation menu will slide in, from left to right:</p>
<div class="flex">    
    <button onclick="openSideNav()" class="cursor-pointer text-[1.6rem] mt-[2px]"><i class="bi bi-list"></i></button>
    <span class="cursor-pointer text-[1.6rem] font-normal">open</span>
</div>
</div>
</section>


<script>
    const sideNav = document.getElementById("sideNav");
    function openSideNav() {
        console.log('salom');
        sideNav.classList.replace('h-0' , 'h-[100vh]')
    }

    function closeSideNav() {
        sideNav.classList.replace( 'h-[100vh]' ,  'h-0')
    }
</script>
</body>
</html>
