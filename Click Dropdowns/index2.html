<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoverable dropdowns</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="px-3 pt-4">
        <h1 class="text-[1.3rem] font-medium">Clickable Dropdown</h1>
        <p class="my-3">Click on the button to open the dropdown menu.</p>

        <button id="hover-btn" class="p-4 bg-[#3498DB] hover:bg-[#2980B9] cursor-pointer duration-150 ease-linear text-white text-[1.1rem] relative ml-auto block">Dropdown
        <ul class="hidden flex-col bg-[#f1f1f1] w-40 shadow-lg shadow-[rgba(0,0,0,0.2)] absolute top-14 right-0">
            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">Home</li>
            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">About</li>
            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">Contact</li>
        </ul>
        </button>
    </div>

    <script>
        const hoverBtn = document.getElementById("hover-btn");

        hoverBtn.onclick = () => 
            hoverBtn.firstElementChild.classList.toggle("hidden");

        hoverBtn.onblur = () =>
            hoverBtn.firstElementChild.classList.add("hidden");

    </script>
</body>
</html>
</body>
</html>
