<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Right Aligned Menu Buttons</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <section class="bg-[#333] text-white flex justify-between flex-wrap">
        <nav>
            <ul class="flex flex-wrap">
                <li class="cursor-pointer p-3 bg-[#04AA6D]">Home</li>
                <li class="cursor-pointer p-3 hover:bg-[#ddd] hover:text-black">News</li>
                <li class="cursor-pointer p-3 hover:bg-[#ddd] hover:text-black">Contact</li>
            </ul>
        </nav>
        <nav>
            <ul class="flex flex-wrap">
                <li class="cursor-pointer p-3 hover:bg-[#ddd] hover:text-black">Search</li>
                <li class="cursor-pointer p-3 hover:bg-[#ddd] hover:text-black">About</li>
            </ul>
        </nav>
    </section>
</body>
</html>
