<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Search</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            border: 8px solid silver;
            height: 100vh;
            padding: 10px;
            position: relative;
        }

        button {
            padding: 10px;
            font-size: 1rem;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: silver;
        }

        .modal {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0, 0.9);
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
        }

        .hidden {
            display: none;
        }

        .block {
            display: block;
        }

        .close {
            font-size: 3rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
        }

        .close:hover {
            color: silver;
        }

        .close__container {
            display: flex;
            justify-content: right;
            padding: 20px;
        }

        .search__button {
            padding: 15px 30px;
            border: none;
        }

        .search__container {
            display: flex;
            justify-content: center;
        }

        #search {
            width: 50%;
            border: none;
            padding: 15px;
        }

    </style>
</head>
<body>
    <div class="container">
        <button id="btn">Open Search Box</button>
        <div class="modal hidden">
            <div class="close__container">
                    <i class="close bi bi-x" id="closeBtn"></i>
            </div>

            <div class="search__container">
                <input id="search" type="search" placeholder="Search.." autocomplete="on">
                <button class="search__button">
                    <i class="bi bi-search"></i>
                </button>
            </div>
            <div></div>
        </div>
    </div>

    <script>
        const modal = document.querySelector('.modal');

        btn.onclick = function() {
            modal.classList.replace('hidden' , 'block');
        }

        const closeBtn = document.getElementById('closeBtn');
        
        closeBtn.onclick = function() {
            modal.classList.replace('block' , 'hidden');
            console.log('salom')
        }
    </script>
</body>
</html>
