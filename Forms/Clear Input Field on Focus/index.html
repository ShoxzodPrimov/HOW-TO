<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear INput Field on Click</title>
</head>
<body>
    <input id="text" type="text" value="Blabla">
    
    <script>
        text.addEventListener('focus' , e => e.target.value = null)
    </script>
</body>
</html>
