<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Navbar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="h-[1600px]">
    <header class="bg-[#f1f1f1] py-15">
        <h1 class="font-bold text-[3rem] text-center">Scroll Down</h1>
        <p class="text-[1.5rem] text-center mt-5">Scroll down to see the sticky effect.</p>
    </header>
    <nav class="bg-[#333] text-white sticky top-0">
        <ul class="flex flex-wrap">
            <li class="p-3 cursor-pointer bg-[#04AA6D] hover:text-black">Home</li>
            <li class="p-3 cursor-pointer hover:bg-[#ddd] hover:text-black">News</li>
            <li class="p-3 cursor-pointer hover:bg-[#ddd] hover:text-black">Contact</li>
        </ul>
    </nav>
</body>
</html>
