<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More button Nav</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <header class="header">
            <ul class="list">
                <li class="list__items">Home</li>
                <li class="list__items">News</li>
                <li class="list__items list__items--dropdown"> <span>Dropdown</span> <i class="bi bi-caret-down-fill"></i>
                  <ul class="lists">
                    <li class="lists__items">Link1</li>
                    <li class="lists__items">Link2</li>
                    <li class="lists__items">Link3</li>
                </ul>
                </li>
            </ul>
        <div class="bottom">
            <h1>Dropdown Menu inside a Navigation Bar</h1>
            <p>Hover over the "Dropdown" link to see the dropdown menu.</p>
        </div>
    </header>
