<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Buttons</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=cached" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="container">
        <button>
            <span id="loading" class="material-symbols-outlined">cached</span>
            <span class="text">Loading </span>
        </button>

        <button>
             <i id="loading" class="fa fa-circle-o-notch"></i>
            <span class="text">Loading </span>
        </button>

        <button>
            <i id="loading" class="fa fa-spinner"></i>
            <span class="text">Loading </span>
        </button>
    </div>
</body>
</html>
