<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Menu Link</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <nav class="bg-[#333] text-white flex justify-between border-solid border-[1px] border-red-600 flex">
        <ul class="flex">
         <div class="flex">
            <li class="cursor-pointer p-3 hover:bg-[#ddd]">News</li>
            <li class="cursor-pointer p-3 hover:bg-[#ddd]">Contact</li>
         </div>
            <li class="cursor-pointer p-3 bg-[#04AA6D]">Home</li>
         <div class="flex">
            <li class="cursor-pointer p-3 hover:bg-[#ddd]">Search</li>
            <li class="cursor-pointer p-3 hover:bg-[#ddd]">About</li>
        </div>
        </ul>
    </nav>
</body>
</html>
