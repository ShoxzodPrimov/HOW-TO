<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottom Border Nav Links</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <nav class="bg-[#f1f1f1]">
        <ul class="flex flex-wrap">
            <li class="p-3 cursor-pointer border-b-3 border-b-red-600">Home</li>
            <li class="p-3 cursor-pointer hover:border-b-3 hover:border-b-red-600">News</li>
            <li class="p-3 cursor-pointer hover:border-b-3 hover:border-b-red-600">Contact</li>
        </ul>
    </nav>
    <div class="p-5">
        <h1 class="mb-2 text-[1.5rem] font-bold">Border Links</h1>
        <p>Hover over the links.</p>
    </div>
</body>
</html>
