<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>icon-bar</title>
    <link rel="stylesheet" href="./src/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body>
    <h1>Vertical tabs</h1>
    <ul class="items-center flex-row w-[4%]">
      <li class="cursor-pointer pl-[18px] py-[13px]  bg-[#04AA6D]"><i class="text-white bi bi-house-door text-[20px]"></i></li>
      <li class="cursor-pointer pl-[18px] py-[13px]  bg-[#555] hover:bg-[#000]"><i class="text-[20px] text-white bi bi-search"></i></li>
      <li class="cursor-pointer pl-[18px] py-[13px]  bg-[#555] hover:bg-[#000]"><i class="text-[20px] text-white bi bi-envelope"></i></li>
      <li class="cursor-pointer pl-[18px] py-[13px]  bg-[#555] hover:bg-[#000]"><i class="text-[20px] text-white bi bi-globe-americas-fill"></i></li>
      <li class="cursor-pointer pl-[18px] py-[13px]  bg-[#555] hover:bg-[#000]"><i class="text-[20px] text-white bi bi-trash"></i></li>
    </ul>

     <h1>Horizontal tabs</h1>
    <ul class="flex items-center">
      <li class="cursor-pointer px-[20px] py-[15px] bg-[#04AA6D]"><i class="text-white bi bi-house-door text-[20px]"></i></li>
      <li class="cursor-pointer px-[20px] py-[15px] bg-[#555] hover:bg-[#000]"><i class="text-[20px] text-white bi bi-search"></i></li>
      <li class="cursor-pointer px-[20px] py-[15px] bg-[#555] hover:bg-[#000]"><i class="text-[20px] text-white bi bi-envelope"></i></li>
      <li class="cursor-pointer px-[20px] py-[15px] bg-[#555] hover:bg-[#000]"><i class="text-[20px] text-white bi bi-globe-americas-fill"></i></li>
      <li class="cursor-pointer px-[20px] py-[15px] bg-[#555] hover:bg-[#000]"><i class="text-[20px] text-white bi bi-trash"></i></li>
    </ul>
  </body>
</html>
