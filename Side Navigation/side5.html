<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Navigation</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body>

<section class="flex h-[100vh] relative">
    <aside class="bg-black h-[100vh] w-0 overflow-hidden absolute z-[1]">
        <div class="flex justify-end mb-7 pt-5 pr-5">
            <div onclick="closeSideBar()" id="hovers" class="flex flex-col cursor-pointer">
                <i class="bi bi-x-lg text-[#818181] font-[900]  duration-100 ease-in hover:text-white"></i>
            </div>
        </div>
            <ul class="flex flex-col gap-2 pl-5 pr-10">
                <li class="text-[#818181] duration-100 ease-in cursor-pointer hover:text-white text-[1.3rem]">About</li>
                <li class="text-[#818181] duration-100 ease-in cursor-pointer hover:text-white text-[1.3rem]">Services</li>
                <li class="text-[#818181] duration-100 ease-in cursor-pointer hover:text-white text-[1.3rem]">Clients</li>
                <li class="text-[#818181] duration-100 ease-in cursor-pointer hover:text-white text-[1.3rem]">Contacts</li>
            </ul>
     </aside>

  <div id="second-position" class="px-2 py-3 flex flex-col gap-3">
    <h1 class="font-bold text-[2rem]">Animated Sidenav Example</h1>
    <p>Click on the element below to open the side navigation menu.</p>
    
    <div class="flex items-center gap-3">
        <div id="openSideNav" onclick="openSideNav()" class="flex h-5 w-6 justify-between flex-col cursor-pointer">
            <div class="bg-black h-1"></div>
            <div class="bg-black h-1"></div>
            <div class="bg-black h-1"></div>
        </div>
        <span class="text-[1.5rem]">open</span>
    </div>

  </div>
</section>

    <script>
        const SideNav = document.querySelector("aside");
        const secondPose = document.getElementById("second-position");
        const hovers = document.getElementById("hovers");

        // open sideNav:
        function openSideNav() {
            SideNav.classList.replace("w-0" , "w-[300px]");
        }

        // close sideNav:
        function closeSideBar() {
            SideNav.classList.replace("w-[300px]" , "w-0")
        }
    </script>
</body>
</html>
