<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Headers</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="w-[400px] m-auto text-white">
    <div class="p-[40px] bg-red-600"  id = "showModal">
        <h1 class="text-[30px]">London</h1>
        <p class="">London is the capital city of England.</p>
    </div>

    <ul id="stop" class="flex bg-[#555]">
        <li class="p-[10px] bg-red-600 hover:bg-[#777] cursor-pointer">London</li>
        <li class="p-[10px] bg-[#555] hover:bg-[#777] cursor-pointer">Paris</li>
        <li class="p-[10px] bg-[#555] hover:bg-[#777] cursor-pointer">Tokyo</li>
        <li class="p-[10px] bg-[#555] hover:bg-[#777] cursor-pointer">Oslo</li>
    </ul>
    </div>
    <script src="./index.js"></script>
</body>
</html>
