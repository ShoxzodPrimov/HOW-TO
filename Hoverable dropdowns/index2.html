<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoverable dropdowns</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="px-3 pt-4">
        <h1 class="text-[1.3rem] font-medium">Hoverable Dropdown</h1>
        <p class="my-3">Move the mouse over the button to open the dropdown menu.</p>

    <div class="flex justify-between">
        <button id="left-btn" class="py-2 px-3 bg-[#04AA6D]  cursor-pointer hover:bg-[#3e8e41] text-white text-[1.1rem] relative">left
        <ul class="hidden flex-col bg-[#f1f1f1] w-40 shadow-lg shadow-[rgba(0,0,0,0.2)] absolute top-11 left-0">
            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">Link1</li>
            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">Link2</li>
            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">Link3</li>
        </ul>
        </button>
        
        <button id="right-btn" class="py-2 px-3 bg-[#04AA6D]  cursor-pointer hover:bg-[#3e8e41] text-white text-[1.1rem] relative">right
        <ul class="hidden flex-col bg-[#f1f1f1] w-40 shadow-lg shadow-[rgba(0,0,0,0.2)] absolute top-11 right-0">
            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">Link1</li>
            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">Link2</li>
            <li class="cursor-pointer hover:bg-[#ddd] p-3 text-left text-black">Link3</li>
        </ul>
        </button>
    </div>
    </div>

    <script>
        // buttons
        const leftBtn = document.getElementById("left-btn");
        const rightBtn = document.getElementById("right-btn");

        // mouseover
        leftBtn.onmouseover = () => actions(leftBtn , "hidden" , "flex");
        rightBtn.onmouseover = () => actions(rightBtn , "hidden", "flex");

        // mouseMove
        leftBtn.onmouseout = () => actions(leftBtn , "flex" , "hidden");
        rightBtn.onmouseout = () => actions(rightBtn , "flex" , "hidden");

        function actions( param , class1 , class2 ) {
            param.firstElementChild.classList.replace(class1 , class2)
        }

    </script>
</body>
</html>
