<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justified Button Group</title>
    <link rel="stylesheet" href="./base.css">
</head>
<body>

    <p>Two buttons in a group:</p>
    <ul class="list">
            <li class="list__items">Apple</li>
            <li class="list__items">Sony</li>
        </ul>

        
    <p style="margin-top: 100px;">Three buttons in a group:</p>
        <ul class="list">
            <li class="list__items">Apple</li>
            <li class="list__items">Samsung</li>
            <li class="list__items">Sony</li>
        </ul>

    
    <p style="margin-top: 100px;">Four buttons in a group:</p>
        <ul class="list">
            <li class="list__items">Apple</li>
            <li class="list__items">Samsung</li>
            <li class="list__items">Sony</li>
            <li class="list__items">HTC</li>
    </ul>
</body>
</html>
