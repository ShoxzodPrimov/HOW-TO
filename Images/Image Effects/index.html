<!DOCTYPE html>

    <title>Image Effects</title>
    <link rel="stylesheet" href="./src/index.css">
</head>
<body>
    <div class="container">
        <img src="./src/assets/img/ananas.jpg" alt="">

    <script>
        const container = document.querySelector(".container");
        const x = new Array(10).fill('').forEach(
            (_ , index) => {

                console.log(index)
            }
        )

    </script>
