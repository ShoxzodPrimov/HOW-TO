<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/index.css">
</head>
<body>
    <p>TEXT</p>
    <div class="container"></div>
    <script>
        const classNames = [ "image1" , "image2" , "image3" , "image4" ];
        const container = document.querySelector(".container");

        classNames.forEach(
            classes => container.innerHTML += `<div class=${classes}></div>`
        )
    </script>
</body>
</html>
