<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip an Image</title>
    <link rel="stylesheet" href="./src/index.css">
</head>
<body>
    <h2>Flip</h2>
    <img class="flip" src="./public/paris.jpg" alt="paris img">

    <h2>Flip-card</h2>

            <div class="flip__front">
                <img src="./public/paris.jpg" alt="">
            </div>
            <div class="flip__back">
                <h1>Paris</h1>
                <p>What an amazing city</p>
            </div>
        </div>
</body>
