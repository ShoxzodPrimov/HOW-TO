<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side by Side Images</title>
    <link rel="stylesheet" href="./src/index.css">
</head>
<body>
    <h1>grid</h1>
    <div class="grid-container">
            <img class="grid-container__images" src="./public/nature1.avif" alt="">
            <img class="grid-container__images" src="./public/nature4.jpg" alt="">
            <img class="grid-container__images" src="./public/nature3.avif" alt="">
    </div>

    <h1>float</h1>
    <div class="float-container">
        <img class="right" src="./public/nature1.avif" alt="">
        <img class="center" src="./public/nature4.jpg" alt="">
        <img class="left" src="./public/nature3.avif" alt="">
    </div>

    <h1>flexbox</h1>
    <div class="flex-container">
        <img class="flex-container__images" src="./public/nature1.avif" alt="">
        <img class="flex-container__images" src="./public/nature4.jpg" alt="">
        <img class="flex-container__images" src="./public/nature3.avif" alt="">
    </div>

<script>

</script>
</body>
</html>
