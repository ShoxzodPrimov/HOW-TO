<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Show</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="container">
        <img src="./public/nature1.avif" alt="">
        <div class="page-direction">
            <span class="page">1</span><span>  / 3</span>
        </div>
        <p class="caption">Caption Text</p>
        <div class="left">❮</div>
        <div class="right">❯</div>
    </div>

    <div class="dote">
        <button value="0" class="dotes active"></button>
        <button value="1" class="dotes"></button>
        <button value="2" class="dotes"></button>
    </div>

<script src="./index.js"></script>
</body>
</html>
