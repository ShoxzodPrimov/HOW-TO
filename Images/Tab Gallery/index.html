<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Gallery</title>
    <link rel="stylesheet" href="./dist/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container">
        <img class="modal-img" onclick="openModal(this)" src="./public/nature1.avif">
        <img class="modal-img" onclick="openModal(this)" src="./public/nature2.jpg">
        <img class="modal-img" onclick="openModal(this)" src="./public/nature3.avif">
        <img class="modal-img" onclick="openModal(this)" src="./public/nature4.jpg">
    </div>
    <div id="showModal">
       <img>
        <i onclick="closeModal()" class="bi bi-x-lg"></i>
    </div>

    <script>
        const showModal = document.getElementById("showModal");

        function openModal(e) {
            showModal.firstElementChild.src = e.src;
            showModal.style.display = "block";
        }

        function closeModal(e) {
            showModal.style.display = "none";
        }
    </script>
</body>
</html>
