<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form on Image</title>
    <link rel="stylesheet" href="./src/index.css">
</head>
<body>
    <div class="container">
      <form autocomplete="off">
            <h1>Login</h1>
        <div class="inputs"> 
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter Email" required autocomplete="new-email">
        </div>

        <div class="inputs">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter Password" required autocomplete="new-password">
        </div>
            <button id="submitBtn" type="submit">Login</button>
      </form>
    </div>

    <script>
    </script>
</body>
</html>
