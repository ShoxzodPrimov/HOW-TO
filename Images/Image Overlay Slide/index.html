<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Overlay Fade</title>
    <link rel="stylesheet" href="./src/index.css">
</head>
<body>
    <h1>Slide in Overlay from the Top</h1>
    <div class="container">
        <div class="fade-top">
            <h1>Hello World</h1> 
        </div>
        <img src="./src/img/img_avatar.png" alt="">
    </div>

    <h1>Slide in Overlay from the Bottom</h1>
    <div class="container2">
        <div class="fade-bottom">
            <h1>Hello World</h1> 
        </div>
        <img src="./src/img/img_avatar.png" alt="">
    </div>

    
    <h1>Slide in Overlay from the Left</h1>
    <div class="container3">
        <div class="fade-left">
            <h1>Hello World</h1> 
        </div>
        <img src="./src/img/img_avatar.png" alt="">
    </div>

    <h1>Slide in Overlay from the right</h1>
    <div class="container4">
        <div class="fade-right">
            <h1>Hello World</h1> 
        </div>
        <img src="./src/img/img_avatar.png" alt="">
    </div>
</body>
</html>
